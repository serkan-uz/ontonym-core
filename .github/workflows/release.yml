name: Publish to PyPI

# Trusted publishing via OIDC — no API token needed.
# To enable, add this repo as a Trusted Publisher on PyPI at
#   https://pypi.org/manage/project/ontonym-core/settings/publishing/
# with:
#   owner = serkan-uz
#   repository = ontonym-core
#   workflow filename = release.yml
#   environment = pypi
#
# Once configured, push a tag named `vX.Y.Z` matching the version in
# pyproject.toml and this workflow will publish to PyPI automatically.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build wheel + sdist and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ontonym-core/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify build matches the tag
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
